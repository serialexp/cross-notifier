name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'v0.0.0-dev'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: cargo build --release -p cross-notifier-daemon

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp target/release/cross-notifier .
          tar -czvf dist/cross-notifier-${VERSION}-linux-amd64.tar.gz \
            cross-notifier \
            README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*.tar.gz

  build-linux-compat:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libx11-dev \
            libxdo-dev \
            libxkbcommon-dev

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: cargo build --release -p cross-notifier-daemon

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp target/release/cross-notifier .
          tar -czvf dist/cross-notifier-${VERSION}-linux-amd64-compat.tar.gz \
            cross-notifier \
            README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-compat
          path: dist/*.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            target: x86_64-apple-darwin
          - arch: arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: cargo build --release -p cross-notifier-daemon --target ${{ matrix.target }}


      - name: Create app bundle
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APP_NAME="CrossNotifier"
          APP_DIR="${APP_NAME}.app"

          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp target/${{ matrix.target }}/release/cross-notifier "${APP_DIR}/Contents/MacOS/"

          if [ -f "Icon.icns" ]; then
            cp Icon.icns "${APP_DIR}/Contents/Resources/"
          fi

          cat > "${APP_DIR}/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>cross-notifier</string>
              <key>CFBundleIconFile</key>
              <string>Icon</string>
              <key>CFBundleIdentifier</key>
              <string>com.crossnotifier.app</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION#v}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION#v}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleSignature</key>
              <string>????</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSUIElement</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=${{ matrix.arch }}
          APP_NAME="CrossNotifier"
          DMG_NAME="CrossNotifier-${VERSION}-macos-${ARCH}.dmg"

          mkdir -p dmg-temp
          cp -R "${APP_NAME}.app" dmg-temp/
          ln -s /Applications dmg-temp/Applications

          mkdir -p dist
          hdiutil create -volname "${APP_NAME}" -srcfolder dmg-temp -ov -format UDZO "dist/${DMG_NAME}"
          rm -rf dmg-temp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: cargo build --release -p cross-notifier-daemon

      - name: Package
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp target/release/cross-notifier.exe .
          7z a -tzip "dist/cross-notifier-${VERSION}-windows-amd64.zip" \
            cross-notifier.exe \
            README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*.zip

  build-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }} -p cross-notifier-server

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cross-notifier-server server
          tar -czvf dist/cross-notifier-server-${VERSION}-linux-${{ matrix.arch }}.tar.gz \
            server \
            README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-${{ matrix.arch }}
          path: dist/*.tar.gz

  build-docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: depot/build-push-action@v1
        with:
          project: ${{ secrets.DEPOT_PROJECT_ID }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            aeolun/cross-notifier-server:latest
            aeolun/cross-notifier-server:${{ steps.version.outputs.version }}
          provenance: true
          sbom: true

  release:
    needs: [build-linux, build-linux-compat, build-macos, build-windows, build-server, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-amd64/*
            artifacts/linux-amd64-compat/*
            artifacts/macos-amd64/*
            artifacts/macos-arm64/*
            artifacts/windows-amd64/*
            artifacts/server-linux-amd64/*
            artifacts/server-linux-arm64/*
          generate_release_notes: true
